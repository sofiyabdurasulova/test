<!DOCTYPE html>
<html lang="ru">

<head>
  <title>карточка</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f2f2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      width: 300p;
      background: white;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      padding: 20px;
      text-align: center;
    }

    .card img {
      width: 100%;
      border-radius: 8px;
    }

    .card h2 {
      margin: 15px 0 10px;
      font-size: 24px;
    }

    .card-content {
      padding: 15px;
    }

    .card p {
      color: #555;
      font-size: 14px;
      margin-top: 8px;
    }

    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 15px;
      background: #496380;
      color: white;
      border-radius: 8px;
      text-decoration: none;
    }

    .btn:hover {
      background: #3b5170;
    }
  </style>
</head>

<body>
  <div class="card">
    <img src="OIP (3).webp" alt="Card Image">
    <h2>не пахнуший парфюм</h2>
    <div class="card-content">
      <p>парфюм абсолютно без запаха</p>
      <a href="#" class="btn">Подробнее</a>
    </div>
  </div>

</body>

</html>
